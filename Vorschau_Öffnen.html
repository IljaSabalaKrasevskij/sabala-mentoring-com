<!DOCTYPE html>
<html lang="de">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Öffne Sabala Mentoring Vorschau...</title>
    <!-- Leitet nach 0 Sekunden auf den lokalen Server um -->
    <meta http-equiv="refresh" content="0; url=http://localhost:3000" />
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            background-color: #f7f7f7;
            color: #333;
            text-align: center;
        }
        .container {
            padding: 2rem;
            background: white;
            border-radius: 12px;
            box-shadow: 0 4px 6px rgba(0,0,0,0.1);
        }
        h1 { font-size: 1.5rem; margin-bottom: 1rem; }
        a {
            display: inline-block;
            margin-top: 1rem;
            padding: 10px 20px;
            background-color: #0070f3;
            color: white;
            text-decoration: none;
            border-radius: 5px;
            font-weight: bold;
        }
        a:hover { background-color: #005bb5; }
    </style>
</head>
<body>
    <div class="container">
        <h1>Vorschau wird geladen...</h1>
        <p>Der lokale Server läuft. Du wirst in Kürze automatisch weitergeleitet.</p>
        <p>Falls nichts passiert:</p>
        <a href="http://localhost:3000" target="_blank">Hier klicken zur Vorschau</a>
    </div>
</body>
</html>
