<!--
  SABALA MENTORING — E-Mail-Signatur
  
  INSTALLATION:
  
  Apple Mail:
  1. Öffne Mail → Einstellungen → Signaturen
  2. Erstelle eine neue Signatur
  3. Schließe Mail
  4. Gehe zu ~/Library/Mail/V10/MailData/Signatures/
  5. Finde die neueste .mailsignature Datei
  6. Öffne sie mit TextEdit, ersetze den HTML-Body mit diesem Code
  7. Speichere und setze die Datei auf "Geschützt" (Rechtsklick → Informationen → Geschützt)
  
  Gmail:
  1. Öffne Gmail → Einstellungen → Alle Einstellungen → Signatur
  2. Klicke auf "Signatur erstellen"
  3. Öffne diese HTML-Datei im Browser
  4. Markiere alles (Cmd+A), kopiere (Cmd+C)
  5. Füge es in das Gmail-Signaturfeld ein (Cmd+V)
  
  Spark:
  1. Öffne Spark → Einstellungen → Accounts → Dein Account → Signatur
  2. Öffne diese HTML-Datei im Browser
  3. Markiere alles, kopiere, füge ein
-->
